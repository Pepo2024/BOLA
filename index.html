<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Pro Glass Calculator</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* خلفية متحركة لتعزيز شكل الزجاج */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* حاوية الآلة الحاسبة الفائقة */
        .calculator {
            position: relative;
            width: 360px;
            padding: 30px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.1); /* شفافية زجاجية */
            backdrop-filter: blur(25px); /* تعتيم الخلفية */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        /* شاشة العرض الاحترافية */
        .display-container {
            margin-bottom: 25px;
            text-align: right;
        }

        .display {
            width: 100%;
            height: 90px;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            outline: none;
            border-radius: 20px;
            color: #fff;
            font-size: 2.8rem;
            padding: 0 20px;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.1);
            font-weight: 300;
        }

        /* شبكة الأزرار */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            position: relative;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1.3rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* تأثير اللمعان عند التمرير */
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* ألوان العمليات الحسابية */
        .operator {
            background: rgba(255, 255, 255, 0.15);
            color: #00d2ff;
            font-size: 1.6rem;
        }

        .clear {
            background: rgba(255, 69, 58, 0.2);
            color: #ff453a;
            border-radius: 20px;
        }

        .equal {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: #fff;
            grid-column: span 2;
            width: 100%;
            border-radius: 20px;
            font-size: 1.8rem;
            border: none;
        }

        .equal:hover {
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
        }

        /* تحسين مظهر الموبايل */
        @media (max-width: 400px) {
            .calculator { width: 90%; padding: 20px; }
            button { width: 55px; height: 55px; }
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display-container">
            <input type="text" class="display" id="result" readonly placeholder="0">
        </div>
        
        <div class="buttons">
            <button class="clear" onclick="clearScreen()">AC</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendSymbol('%', '%')">%</button>
            <button class="operator" onclick="appendSymbol('÷', '/')">÷</button>
            
            <button onclick="appendSymbol('7', '7')">7</button>
            <button onclick="appendSymbol('8', '8')">8</button>
            <button onclick="appendSymbol('9', '9')">9</button>
            <button class="operator" onclick="appendSymbol('×', '*')">×</button>
            
            <button onclick="appendSymbol('4', '4')">4</button>
            <button onclick="appendSymbol('5', '5')">5</button>
            <button onclick="appendSymbol('6', '6')">6</button>
            <button class="operator" onclick="appendSymbol('-', '-')">-</button>
            
            <button onclick="appendSymbol('1', '1')">1</button>
            <button onclick="appendSymbol('2', '2')">2</button>
            <button onclick="appendSymbol('3', '3')">3</button>
            <button class="operator" onclick="appendSymbol('+', '+')">+</button>
            
            <button onclick="appendSymbol('0', '0')">0</button>
            <button onclick="appendSymbol('.', '.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('result');
        let realExpression = "";

        function appendSymbol(visual, math) {
            if (display.value === "Error" || display.value === "Infinity") {
                display.value = "";
                realExpression = "";
            }
            display.value += visual;
            realExpression += math;
        }

        function clearScreen() {
            display.value = "";
            realExpression = "";
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
            realExpression = realExpression.slice(0, -1);
        }

        function calculate() {
            try {
                if (realExpression === "") return;
                let result = eval(realExpression);
                
                // تنسيق النتيجة لتبدو احترافية
                if (Number.isInteger(result)) {
                    display.value = result;
                } else {
                    display.value = parseFloat(result.toFixed(8));
                }
                realExpression = display.value.toString();
            } catch (error) {
                display.value = "Error";
                realExpression = "";
            }
        }
    </script>
</body>
</html>
